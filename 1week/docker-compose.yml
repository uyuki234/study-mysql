version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: study-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: study_db
      MYSQL_USER: studyuser
      MYSQL_PASSWORD: studypass
      TZ: Asia/Tokyo
    volumes:
      - ./mysql-data:/var/lib/mysql
